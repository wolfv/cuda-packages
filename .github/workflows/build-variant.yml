name: Build package variant

# Manual "trigger thing": run from the Actions tab ("Run workflow") or with
#   gh workflow run build-variant.yml -f package=causal-conv1d -f cuda_arch=sm90
on:
  workflow_dispatch:
    inputs:
      package:
        description: Recipe to build
        type: choice
        options:
          - causal-conv1d
          - flash-attn
          - fla-core
          - flash-linear-attention
        default: causal-conv1d
      cuda_compiler_version:
        description: CUDA toolkit version (ignored for flash-linear-attention)
        type: choice
        options:
          - "12.6"
          - "12.9"
          - "13.0"
        default: "12.9"
      cuda_arch:
        description: GPU generation, min-sm of the group (ignored for flash-linear-attention)
        type: choice
        options:
          - sm80    # Ampere               (sm_80, sm_86, sm_89)
          - sm90    # Hopper               (sm_90)
          - sm100   # Blackwell datacenter (sm_100, sm_103) — needs CUDA >= 12.8
          - sm120   # Blackwell consumer   (sm_120, sm_121) — needs CUDA >= 12.8
        default: sm90
      python_version:
        description: Python version (ignored for flash-linear-attention)
        type: choice
        options:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
        default: "3.12"
      run_tests:
        description: Run the package tests (needs a CUDA GPU; leave off on CPU runners)
        type: boolean
        default: false

jobs:
  build:
    name: ${{ inputs.package }} · cuda${{ inputs.cuda_compiler_version }} · ${{ inputs.cuda_arch }} · py${{ inputs.python_version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          run-install: false

      - name: Build the selected variant
        shell: bash
        run: |
          set -euo pipefail
          PKG='${{ inputs.package }}'
          CUDA='${{ inputs.cuda_compiler_version }}'
          ARCH='${{ inputs.cuda_arch }}'
          PYV='${{ inputs.python_version }}'

          ARGS=(build --recipe "$PKG" --output-dir ./output)
          if [ '${{ inputs.run_tests }}' = 'true' ]; then
            ARGS+=(--test native-and-emulated)
          else
            ARGS+=(--test skip)
          fi

          if [ "$PKG" = "flash-linear-attention" ] || [ "$PKG" = "fla-core" ]; then
            echo "noarch package — cuda/arch/python inputs are ignored."
          else
            if { [ "$ARCH" = "sm100" ] || [ "$ARCH" = "sm120" ]; } && [ "$CUDA" = "12.6" ]; then
              echo "::error::$ARCH (Blackwell) requires CUDA >= 12.8 — pick 12.9 or 13.0. This cell is skipped in the recipe and builds nothing."
              exit 1
            fi
            # cuda_arch is zipped with these three keys (source of truth:
            # $PKG/variants.yaml), so the whole tuple must be overridden together —
            # overriding cuda_arch alone breaks the equal-length zip requirement.
            case "$ARCH" in
              sm80)  TORCH="8.0;8.6;8.9+PTX"; MINCC="8.0";  PRIO="3" ;;
              sm90)  TORCH="9.0+PTX";         MINCC="9.0";  PRIO="2" ;;
              sm100) TORCH="10.0+PTX";        MINCC="10.0"; PRIO="1" ;;
              sm120) TORCH="12.0+PTX";        MINCC="12.0"; PRIO="0" ;;
              *) echo "::error::unknown cuda_arch '$ARCH'"; exit 1 ;;
            esac
            # Host gcc + glibc must match the CUDA toolkit (12.6->gcc13; 13.0->glibc
            # 2.28). Mirrors conda-forge's cuda130 migration; zipped with cuda below.
            case "$CUDA" in
              12.6) GCC="13"; GLIBC="2.17" ;;
              12.9) GCC="14"; GLIBC="2.17" ;;
              13.0) GCC="14"; GLIBC="2.28" ;;
              *) echo "::error::unknown cuda_compiler_version '$CUDA'"; exit 1 ;;
            esac
            # GitHub-hosted runners have no NVIDIA driver, so the __cuda virtual
            # package is absent and `pytorch *cuda*` won't resolve. Inject it for
            # the solve. For tests, also inject __cuda_arch to satisfy the CEP-46
            # run-gate (the kernels still can't actually execute without a GPU).
            export CONDA_OVERRIDE_CUDA="$CUDA"
            if [ '${{ inputs.run_tests }}' = 'true' ]; then
              export CONDA_OVERRIDE_CUDA_ARCH="$MINCC"
            fi
            ARGS+=(-m pinning/conda_build_config.yaml -m "$PKG/variants.yaml")
            ARGS+=(--target-platform linux-64)
            ARGS+=(--variant "cuda_compiler_version=$CUDA")
            ARGS+=(--variant "c_compiler_version=$GCC")
            ARGS+=(--variant "cxx_compiler_version=$GCC")
            ARGS+=(--variant "fortran_compiler_version=$GCC")
            ARGS+=(--variant "c_stdlib_version=$GLIBC")
            ARGS+=(--variant "cuda_arch=$ARCH")
            ARGS+=(--variant "torch_cuda_arch_list=$TORCH")
            ARGS+=(--variant "min_cuda_arch=$MINCC")
            ARGS+=(--variant "arch_priority=$PRIO")
            ARGS+=(--variant "python=$PYV")
          fi

          echo "+ rattler-build ${ARGS[*]}"
          pixi exec rattler-build "${ARGS[@]}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.package }}-cuda${{ inputs.cuda_compiler_version }}-${{ inputs.cuda_arch }}-py${{ inputs.python_version }}
          path: output/**/*.conda
          if-no-files-found: warn
