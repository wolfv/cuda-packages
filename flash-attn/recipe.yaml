schema_version: 1

context:
  version: "2.8.3"
  # Strip ".postX" (wheel-rebuild markers) from the package version; the source
  # tarball / dist-info still use the full upstream version.
  pkg_version: ${{ (version | split("."))[:3] | join(".") }}
  build_number: 3

recipe:
  name: flash-attn-split
  version: ${{ pkg_version }}

source:
  # PyPI sdist (bundles a specific revendored CUTLASS)
  - url: https://pypi.org/packages/source/f/flash-attn/flash_attn-${{ version }}.tar.gz
    sha256: 1e71dd64a9e0280e0447b8a0c2541bad4bf6ac65bdeaa2f90e51a9e57de0370d
  # Simpler build files that don't try to revend pre-compiled binaries
  - path: pyproject.toml
  - path: setup.py

outputs:
  # ---- build everything once; the three packages below split the artifacts ----
  - staging:
      name: flash-attn-build
    build:
      # Staging builds only allow `script`; this build is materialized once per
      # variant that a (non-skipped) output below actually consumes, so the
      # `skip`/`variant` rules on the published outputs govern what gets built.
      script:
        env:
          # Limit MAX_JOBS so CI runners don't OOM during the heavy CUDA compile.
          MAX_JOBS: "4"
          # Compile SASS+PTX only for this variant's GPU generation, not a fat binary.
          TORCH_CUDA_ARCH_LIST: ${{ torch_cuda_arch_list }}
        content:
          - python -m pip install . -vvv --no-deps --no-build-isolation
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ compiler('cuda') }}
        - ${{ stdlib('c') }}
        - ninja
      host:
        - cuda-version ==${{ cuda_compiler_version }}  # same cuda for host and build
        - cuda-cudart-dev
        - libcublas-dev
        - libcurand-dev
        - libcusolver-dev
        - libcusparse-dev
        - pip
        - python
        - pytorch
        - pytorch * cuda*
        - setuptools

  # ---- main package: the flash_attn python package + its core CUDA extension ----
  - package:
      name: flash-attn
    inherit: flash-attn-build
    build:
      string: ${{ "cuda" ~ (cuda_compiler_version | replace(".", "")) ~ "_" ~ cuda_arch ~ "_py" ~ (python | version_to_buildstring) ~ "_h" ~ hash ~ "_" ~ build_number }}
      skip:
        - cuda_compiler_version == "None"
        - not linux
        - cuda_arch == "sm100" and cuda_compiler_version == "12.6"
      variant:
        use_keys:
          - cuda_compiler_version
          - cuda_arch
        down_prioritize_variant: ${{ arch_priority | int }}
      files:
        include:
          - lib/python*/site-packages/flash_attn/**
          - lib/python*/site-packages/flash_attn-${{ version }}.dist-info/**
          - lib/python*/site-packages/flash_attn_2_cuda.cpython-*.so
    requirements:
      run:
        - einops
        - python
        - pytorch * cuda*
        # CEP-0046 hardware gate for this variant's GPU generation.
        - __cuda_arch >=${{ min_cuda_arch }}
    tests:
      - python:
          imports:
            - flash_attn
          pip_check: true

  # ---- optional fused-dense extension ----
  - package:
      name: flash-attn-fused-dense
    inherit: flash-attn-build
    build:
      string: ${{ "cuda" ~ (cuda_compiler_version | replace(".", "")) ~ "_" ~ cuda_arch ~ "_py" ~ (python | version_to_buildstring) ~ "_h" ~ hash ~ "_" ~ build_number }}
      skip:
        - cuda_compiler_version == "None"
        - not linux
        - cuda_arch == "sm100" and cuda_compiler_version == "12.6"
      variant:
        use_keys:
          - cuda_compiler_version
          - cuda_arch
        down_prioritize_variant: ${{ arch_priority | int }}
      files:
        include:
          - lib/python*/site-packages/fused_dense_lib.cpython-*.so
    requirements:
      run:
        - python
        # exact pin ties this to the matching flash-attn variant, so the
        # __cuda_arch gate is inherited transitively.
        - ${{ pin_subpackage('flash-attn', exact=True) }}
    tests:
      - python:
          imports:
            - flash_attn.ops.fused_dense
          pip_check: true

  # ---- optional fused layer-norm extension ----
  - package:
      name: flash-attn-layer-norm
    inherit: flash-attn-build
    build:
      string: ${{ "cuda" ~ (cuda_compiler_version | replace(".", "")) ~ "_" ~ cuda_arch ~ "_py" ~ (python | version_to_buildstring) ~ "_h" ~ hash ~ "_" ~ build_number }}
      skip:
        - cuda_compiler_version == "None"
        - not linux
        - cuda_arch == "sm100" and cuda_compiler_version == "12.6"
      variant:
        use_keys:
          - cuda_compiler_version
          - cuda_arch
        down_prioritize_variant: ${{ arch_priority | int }}
      files:
        include:
          - lib/python*/site-packages/dropout_layer_norm.cpython-*.so
    requirements:
      run:
        - python
        - ${{ pin_subpackage('flash-attn', exact=True) }}
    tests:
      - python:
          imports:
            - flash_attn.ops.layer_norm
          pip_check: true

about:
  homepage: https://github.com/Dao-AILab/flash-attention
  summary: 'Flash Attention: Fast and Memory-Efficient Exact Attention'
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - LICENSE_CUTLASS.txt

extra:
  feedstock-name: flash-attn
  recipe-maintainers:
    - carterbox
    - weiji14
