# Two variant axes for flash-attn (see causal-conv1d/variants.yaml for the rationale):
#   1. cuda_compiler_version  -> CUDA-version-specific variants (12.6 / 12.9 / 13.0)
#   2. cuda_arch (+ zipped siblings) -> CUDA-arch-specific variants per GPU generation
# cuda_compiler_version is cartesian with the (zipped) arch group.

cuda_compiler_version:
  # pytorch 2.10 only ships CUDA 12.9 and 13.0 on conda-forge (no cu126 build),
  # so those are the only achievable CUDA versions here.
  - "12.9"
  - "13.0"
# Host gcc + glibc must match each CUDA toolkit: CUDA 13.0 needs a newer glibc
# (2.28). Values mirror conda-forge's cuda130 migration. Zipped with
# cuda_compiler_version so each CUDA version pulls its compatible toolchain
# (overriding cuda alone would break that pairing).
c_compiler_version:
  - "14"
  - "14"
cxx_compiler_version:
  - "14"
  - "14"
fortran_compiler_version:
  - "14"
  - "14"
c_stdlib_version:
  - "2.17"
  - "2.28"

zip_keys:
  - [cuda_compiler_version, c_compiler_version, cxx_compiler_version, fortran_compiler_version, c_stdlib_version]
  - [cuda_arch, torch_cuda_arch_list, min_cuda_arch, arch_priority]

cuda_arch:            # min-sm label for the generation, used in the build string
  - sm80              # Ampere               (sm_80, sm_86, sm_89)
  - sm90              # Hopper               (sm_90)
  - sm100             # Blackwell datacenter (sm_100, sm_103) — 10.x family
  - sm120             # Blackwell consumer   (sm_120, sm_121) — 12.x family
torch_cuda_arch_list: # value of TORCH_CUDA_ARCH_LIST; PTX on the top of each group.
                      # 10.x and 12.x are separate, non-cross-compatible SASS families,
                      # built as distinct variants (smaller binaries + far less compile
                      # memory). PTX gives forward-compat within/above each family.
  - "8.0;8.6;8.9+PTX"
  - "9.0+PTX"
  - "10.0+PTX"
  - "12.0+PTX"
min_cuda_arch:        # the `__cuda_arch >=X.Y` run-gate (CEP-0046, {major}.{minor})
  - "8.0"
  - "9.0"
  - "10.0"
  - "12.0"
arch_priority:        # down_prioritize_variant penalty: higher == less preferred
  - "3"               # sm80  (broadest fallback)
  - "2"               # sm90
  - "1"               # sm100
  - "0"               # sm120 (preferred whenever the hardware supports it)
